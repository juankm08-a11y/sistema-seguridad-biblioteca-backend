<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Demo Seguridad Biblioteca</title>
  </head>
  <body>
    <h2>Login Biblioteca</h2>
    <input id="email" placeholder="Email" /><br />
    <input id="pass" type="password" placeholder="Password" /><br />
    <button onclick="paso1()">Enviar Código</button>

    <hr />
    <input id="code" placeholder="Código 4 dígitos" />
    <button onclick="paso2()">Validar y Entrar</button>

    <hr />
    <button onclick="accederRuta('/mi-espacio')">
      Ver Libros (Estudiante)
    </button>
    <button onclick="accederRuta('/dashboard-admin')">Admin Dashboard</button>
    <button onclick="renovar()">Forzar Refresh Token</button>

    <pre id="output"></pre>

    <script>
      let tokens = { access: "", refresh: "" };
      const API = "http://localhost:3000";

      async function paso1() {
        const res = await fetch(`${API}/login-paso1`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("pass").value,
          }),
        });
        const data = await res.json();
        document.getElementById("output").innerText = data.mensaje;
      }

      async function paso2() {
        const res = await fetch(`${API}/login-paso2`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            code: document.getElementById("code").value,
          }),
        });
        const data = await res.json();
        tokens.access = data.accessToken;
        tokens.refresh = data.refreshToken;
        document.getElementById("output").innerText =
          "Logueado. Access Token expira en 15s";
      }

      async function accederRuta(ruta) {
        const res = await fetch(`${API}${ruta}`, {
          headers: { Authorization: `Bearer ${tokens.access}` },
        });
        const data = await res.json();
        document.getElementById("output").innerText = JSON.stringify(
          data,
          null,
          2,
        );
      }

      async function renovar() {
        const res = await fetch(`${API}/refresh-token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: tokens.refresh }),
        });
        const data = await res.json();
        tokens.access = data.accessToken;
        document.getElementById("output").innerText =
          "Token renovado por 15s más";
      }
    </script>
  </body>
</html>
